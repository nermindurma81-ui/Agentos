version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentixos
      POSTGRES_USER: agentixos
      POSTGRES_PASSWORD: agentixos
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio:/data"]

  tusd:
    image: tusproject/tusd:latest
    command: ["-upload-dir", "/data", "-hooks-http", "http://backend:8000/api/v1/uploads/callback", "-hooks-enabled-events", "post-finish"]
    ports: ["1080:1080"]
    volumes: ["tus:/data"]

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes: ["../apps/backend:/app"]
    command: sh -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://agentixos:agentixos@postgres:5432/agentixos
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on: [postgres, redis, minio]
    ports: ["8000:8000"]

  gateway:
    image: node:20
    working_dir: /app
    volumes: ["../apps/gateway:/app"]
    command: sh -c "npm install && node src/server.js"
    environment:
      BACKEND_URL: http://backend:8000
      REDIS_URL: redis://redis:6379/0
    depends_on: [backend, redis]
    ports: ["8080:8080"]

  frontend:
    image: node:20
    working_dir: /app
    volumes: ["../apps/mobile-pwa:/app"]
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
    depends_on: [gateway]
    ports: ["3000:3000"]

volumes:
  pgdata:
  minio:
  tus:
